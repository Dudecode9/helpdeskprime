services:
  backend:
    ports: []

  frontend:
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ENABLE_HTTPS: ${ENABLE_HTTPS}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${TLS_SOURCE_DIR:-./infra/certs}:/etc/nginx/certs:ro
