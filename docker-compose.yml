services:
  postgres:
    image: postgres:15-alpine
    container_name: helpdesk_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 03011
      POSTGRES_DB: helpde
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: helpdesk_backend
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: 03011
      DB_NAME: helpde
      DB_PORT: 5432
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: helpdesk_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: